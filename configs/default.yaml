# MemJudge default configuration

project_name: memjudge

# ── Embedding ──────────────────────────────────────────────────────────────
embedding:
  model: bge-large       # bge-large | minilm | gte-large | hashing
  device: cpu

# ── LLM ────────────────────────────────────────────────────────────────────
llm:
  # Use local open-source models (offline on GPU node)
  provider: huggingface  # huggingface | vllm
  model: Qwen/Qwen2.5-7B-Instruct
  # Alternatives:
  # model: meta-llama/Llama-3.1-8B-Instruct
  # model: mistralai/Mistral-7B-Instruct-v0.3

# ── Retrieval ──────────────────────────────────────────────────────────────
retrieval:
  top_k: 8
  top_k_tools: 3
  bm25_weight: 0.55
  dense_weight: 0.45

# ── Memory ─────────────────────────────────────────────────────────────────
memory:
  ephemeral_session_window: 2
  duplicate_threshold: 0.88

# ── MemJudge controller ────────────────────────────────────────────────────
memjudge:
  persist_threshold: 0.55
  ephemeral_threshold: 0.58
  utility_weight: 1.05
  confidence_weight: 0.15
  novelty_weight: 0.35
  recency_weight: 0.10
  type_weight: 0.35
  derivability_weight: 1.00
  stale_weight: 0.75
